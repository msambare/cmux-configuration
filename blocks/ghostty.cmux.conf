# cmux-configuration — managed Ghostty overrides (cmux-config-owned keys ONLY).
# Read by BOTH cmux and standalone Ghostty.app. Injected AFTER your personal lines,
# so these win; your personal font/mouse/keybinds/etc. stay above, untouched.

# Catppuccin Mocha terminal theme (shared by cmux + Ghostty — they read the same file).
theme = Catppuccin Mocha

# Ghostty.app launches zsh. (cmux ignores this and uses the OS login shell; the fish/zsh
# blocks route cmux to zsh. OS/other terminals stay on the login shell = fish.)
command = /bin/zsh -l

# Detect the shell that actually runs (zsh in cmux/Ghostty) and inject the right integration.
shell-integration = detect
